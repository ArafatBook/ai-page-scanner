name: Python Password Manager CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # এখানে আপনার project dependencies থাকলে install করুন
        # উদাহরণ: pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # project folder check
        flake8 .

    - name: Run script
      run: |
        python main.py
